name: Build & Release APK

# 手动触发：选择版本递增类型后自动完成 版本号自增 → 打包 → 发布 Release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 版本递增类型（patch=修订号+1，minor=次版本+1，major=主版本+1）
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

# 允许 workflow 提交代码、创建 tag 与 Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 JDK 21（Gradle daemon 要求）
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 读取当前版本号
        id: cur
        run: |
          VERSION_NAME=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          VERSION_CODE=$(grep -oP 'versionCode = \K[0-9]+' app/build.gradle.kts)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "当前版本: $VERSION_NAME (versionCode $VERSION_CODE)"

      - name: 计算新版本号
        env:
          CUR_VERSION: ${{ steps.cur.outputs.version_name }}
          BUMP: ${{ inputs.bump }}
        run: |
          python3 - <<'PY'
          import os
          cur = os.environ['CUR_VERSION']
          bump = os.environ['BUMP']
          parts = cur.split('.')
          major = int(parts[0])
          minor = int(parts[1]) if len(parts) > 1 else 0
          patch = int(parts[2]) if len(parts) > 2 else 0
          if bump == 'major':
              major += 1; minor = 0; patch = 0
          elif bump == 'minor':
              minor += 1; patch = 0
          else:
              patch += 1
          new_name = f"{major}.{minor}.{patch}"
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"NEW_VERSION_NAME={new_name}\n")
          print(f"新版本: {new_name}")
          PY
          NEW_CODE=$(( ${{ steps.cur.outputs.version_code }} + 1 ))
          echo "NEW_VERSION_CODE=$NEW_CODE" >> $GITHUB_ENV
          echo "新 versionCode: $NEW_CODE"

      - name: 写入新版本号到 build.gradle.kts
        run: |
          sed -i -E "s/versionCode = [0-9]+/versionCode = $NEW_VERSION_CODE/" app/build.gradle.kts
          sed -i -E "s/versionName = \"[^\"]+\"/versionName = \"$NEW_VERSION_NAME\"/" app/build.gradle.kts
          echo "=== 更新后的版本配置 ==="
          grep -E "version(Code|Name)" app/build.gradle.kts

      - name: 解码签名 keystore（仅当启用了 release 签名）
        if: ${{ vars.ENABLE_RELEASE_SIGNING == 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/release.keystore
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV
          echo "已加载签名 keystore"

      - name: 构建 APK
        env:
          SIGNING_KEYSTORE_PATH: ${{ env.SIGNING_KEYSTORE_PATH }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ -n "$SIGNING_KEYSTORE_PATH" ] && [ -f "$SIGNING_KEYSTORE_PATH" ]; then
            echo "构建签名 release APK..."
            ./gradlew assembleRelease --no-daemon
            echo "BUILD_TYPE=release" >> $GITHUB_ENV
          else
            echo "未配置签名密钥，构建 debug APK（debug 自带签名，可直接安装测试）..."
            ./gradlew assembleDebug --no-daemon
            echo "BUILD_TYPE=debug" >> $GITHUB_ENV
          fi

      - name: 重命名 APK 产物
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "未找到 APK 产物"; exit 1
          fi
          OUT="$RUNNER_TEMP/choose-v${NEW_VERSION_NAME}.apk"
          cp "$APK" "$OUT"
          echo "apk_path=$OUT" >> $GITHUB_OUTPUT
          echo "APK 产物: $OUT ($(du -h "$OUT" | cut -f1))"

      - name: 提交版本号变更并打 tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: 发布 v${NEW_VERSION_NAME} (versionCode ${NEW_VERSION_CODE})"
          git tag "v${NEW_VERSION_NAME}"

      - name: 推送提交与标签
        run: |
          git push origin main
          git push origin "v${NEW_VERSION_NAME}"

      - name: 创建 GitHub Release 并上传 APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION_NAME }}
          name: v${{ env.NEW_VERSION_NAME }}
          generate_release_notes: true
          body: |
            ## 选择 v${{ env.NEW_VERSION_NAME }}

            | 项目 | 值 |
            | --- | --- |
            | 版本类型 | ${{ inputs.bump }} |
            | versionName | ${{ env.NEW_VERSION_NAME }} |
            | versionCode | ${{ env.NEW_VERSION_CODE }} |
            | 构建类型 | ${{ env.BUILD_TYPE }} |

            ### 安装方法
            下载下方 `choose-v${{ env.NEW_VERSION_NAME }}.apk`，在手机「设置 → 安全 → 安装未知来源应用」中允许后，点击安装即可。
          files: ${{ steps.apk.outputs.apk_path }}
          prerelease: false
